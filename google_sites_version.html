<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Downloader - Google Sites</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tabler-icons@latest/tabler-icons.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Google Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f8f9fa;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #4285F4 0%, #1F2937 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 26px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .header p {
            font-size: 13px;
            opacity: 0.9;
        }

        .content {
            padding: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #202124;
            font-size: 14px;
        }

        input[type="text"],
        input[type="url"],
        select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #dadce0;
            border-radius: 6px;
            font-size: 14px;
            transition: all 0.2s;
        }

        input[type="text"]:focus,
        input[type="url"]:focus,
        select:focus {
            outline: none;
            border-color: #4285F4;
            box-shadow: 0 0 0 2px rgba(66, 133, 244, 0.1);
        }

        .format-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 8px;
        }

        .format-option {
            position: relative;
            padding: 12px;
            border: 1px solid #dadce0;
            border-radius: 6px;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
        }

        .format-option input[type="radio"] {
            display: none;
        }

        .format-option:has(input:checked) {
            border-color: #4285F4;
            background: rgba(66, 133, 244, 0.05);
        }

        .format-option label {
            margin: 0;
            cursor: pointer;
            font-weight: 500;
            font-size: 13px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }

        button {
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary {
            background: #4285F4;
            color: white;
            flex: 1;
        }

        .btn-primary:hover:not(:disabled) {
            background: #3367D6;
            box-shadow: 0 2px 4px rgba(66, 133, 244, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: #f8f9fa;
            color: #202124;
            border: 1px solid #dadce0;
        }

        .btn-secondary:hover {
            background: #f1f3f4;
        }

        .video-info {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            border-left: 4px solid #4285F4;
            display: none;
        }

        .video-info.show {
            display: block;
        }

        .video-title {
            font-size: 15px;
            font-weight: 500;
            color: #202124;
            margin-bottom: 6px;
        }

        .video-meta {
            font-size: 13px;
            color: #5f6368;
        }

        .message {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 13px;
            display: none;
        }

        .message.show {
            display: block;
        }

        .message.error {
            background: #fce8e6;
            color: #b3261e;
            border-left: 4px solid #b3261e;
        }

        .message.success {
            background: #e6f4ea;
            color: #137333;
            border-left: 4px solid #137333;
        }

        .message.info {
            background: #e8f0fe;
            color: #1f2937;
            border-left: 4px solid #4285F4;
        }

        .loading {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(0, 0, 0, 0.1);
            border-radius: 50%;
            border-top-color: #4285F4;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .quality-selector {
            display: none;
        }

        .quality-selector.show {
            display: block;
        }

        .footer {
            border-top: 1px solid #dadce0;
            padding: 15px 30px;
            background: #f8f9fa;
            font-size: 12px;
            color: #5f6368;
            text-align: center;
        }

        @media (max-width: 480px) {
            .content {
                padding: 20px;
            }

            .header {
                padding: 20px;
            }

            .header h1 {
                font-size: 22px;
            }

            .format-selector {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>
                <i class="ti ti-brand-youtube"></i>
                YouTube Downloader
            </h1>
            <p>Baixe vídeos do YouTube direto do Google Sites</p>
        </div>

        <div class="content">
            <div class="message error" id="messageError"></div>
            <div class="message success" id="messageSuccess"></div>
            <div class="message info" id="messageInfo"></div>

            <form id="downloadForm">
                <div class="form-group">
                    <label for="urlInput">URL do vídeo YouTube</label>
                    <input 
                        type="url"
                        id="urlInput" 
                        placeholder="https://www.youtube.com/watch?v=..."
                        required
                    >
                </div>

                <div class="form-group">
                    <label>Formato</label>
                    <div class="format-selector">
                        <div class="format-option">
                            <input type="radio" id="format-video" name="format" value="video" checked>
                            <label for="format-video">
                                <i class="ti ti-video"></i><br>
                                Vídeo (MP4)
                            </label>
                        </div>
                        <div class="format-option">
                            <input type="radio" id="format-audio" name="format" value="audio">
                            <label for="format-audio">
                                <i class="ti ti-music"></i><br>
                                Áudio (MP3)
                            </label>
                        </div>
                    </div>
                </div>

                <div class="form-group quality-selector" id="qualityGroup">
                    <label for="quality">Qualidade</label>
                    <select id="quality">
                        <option value="best">Melhor disponível</option>
                        <option value="720">720p HD</option>
                        <option value="480">480p SD</option>
                    </select>
                </div>

                <div class="video-info" id="videoInfo">
                    <div class="video-title" id="videoTitle">-</div>
                    <div class="video-meta" id="videoMeta">-</div>
                </div>

                <div class="button-group">
                    <button type="button" class="btn-secondary" id="clearBtn">
                        <i class="ti ti-trash"></i> Limpar
                    </button>
                    <button type="button" class="btn-primary" id="checkBtn">
                        <i class="ti ti-info-circle"></i> Verificar
                    </button>
                    <button type="submit" class="btn-primary" id="downloadBtn" style="display: none;">
                        <i class="ti ti-download"></i> Baixar
                    </button>
                </div>
            </form>
        </div>

        <div class="footer">
            <p>⚠️ Respeite os direitos autorais. Baixe apenas conteúdo que você tem permissão.</p>
        </div>
    </div>

    <script>
        // URL do servidor Render
        const SERVER_URL = 'https://youtube-4vor.onrender.com';
        
        const form = document.getElementById('downloadForm');
        const urlInput = document.getElementById('urlInput');
        const formatInputs = document.querySelectorAll('input[name="format"]');
        const qualityGroup = document.getElementById('qualityGroup');
        const checkBtn = document.getElementById('checkBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const clearBtn = document.getElementById('clearBtn');
        const videoInfo = document.getElementById('videoInfo');

        const messageError = document.getElementById('messageError');
        const messageSuccess = document.getElementById('messageSuccess');
        const messageInfo = document.getElementById('messageInfo');

        let videoValidated = false;

        // Mudar qualidade ao selecionar formato
        formatInputs.forEach(input => {
            input.addEventListener('change', function() {
                if (this.value === 'audio') {
                    qualityGroup.classList.remove('show');
                } else {
                    qualityGroup.classList.add('show');
                }
                videoValidated = false;
                downloadBtn.style.display = 'none';
            });
        });

        // Limpar formulário
        clearBtn.addEventListener('click', function() {
            form.reset();
            videoInfo.classList.remove('show');
            hideMessages();
            videoValidated = false;
            downloadBtn.style.display = 'none';
            urlInput.focus();
        });

        // Verificar vídeo
        checkBtn.addEventListener('click', async function(e) {
            e.preventDefault();
            const url = urlInput.value.trim();

            if (!url) {
                showError('Insira uma URL válida');
                return;
            }

            checkBtn.disabled = true;
            checkBtn.innerHTML = '<div class="loading"></div> Verificando...';
            hideMessages();

            try {
                const response = await fetch(`${SERVER_URL}/api/video-info`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });

                if (!response.ok) throw new Error('Erro ao conectar');

                const data = await response.json();

                if (!data.success) {
                    showError(data.error || 'Erro ao obter informações');
                } else {
                    document.getElementById('videoTitle').textContent = data.title;
                    document.getElementById('videoMeta').textContent = `⏱️ ${data.duration}`;
                    videoInfo.classList.add('show');
                    videoValidated = true;
                    downloadBtn.style.display = 'flex';
                    showSuccess('✓ Vídeo validado! Clique em "Baixar"');
                }
            } catch (error) {
                showError('❌ Erro ao conectar ao servidor');
                console.error('Erro:', error);
            } finally {
                checkBtn.disabled = false;
                checkBtn.innerHTML = '<i class="ti ti-info-circle"></i> Verificar';
            }
        });

        // Fazer download
        form.addEventListener('submit', async function(e) {
            e.preventDefault();

            if (!videoValidated) {
                showError('Verifique o vídeo antes de baixar');
                return;
            }

            const url = urlInput.value.trim();
            const format = document.querySelector('input[name="format"]:checked').value;
            const quality = document.getElementById('quality').value;

            downloadBtn.disabled = true;
            downloadBtn.innerHTML = '<div class="loading"></div> Processando...';
            hideMessages();

            try {
                showInfo('⏳ Baixando... isto pode levar alguns minutos...');

                const response = await fetch(`${SERVER_URL}/api/download`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url, format, quality })
                });

                const data = await response.json();

                if (data.success) {
                    showSuccess('✓ Download concluído! Abrindo...');
                    setTimeout(() => {
                        window.open(`${SERVER_URL}${data.downloadUrl}`, '_blank');
                    }, 1000);
                } else {
                    showError('❌ ' + (data.error || 'Erro no download'));
                }
            } catch (error) {
                showError('❌ Erro: ' + error.message);
                console.error('Erro:', error);
            } finally {
                downloadBtn.disabled = false;
                downloadBtn.innerHTML = '<i class="ti ti-download"></i> Baixar';
            }
        });

        function showError(msg) {
            messageError.textContent = msg;
            messageError.classList.add('show');
            messageSuccess.classList.remove('show');
            messageInfo.classList.remove('show');
        }

        function showSuccess(msg) {
            messageSuccess.textContent = msg;
            messageSuccess.classList.add('show');
            messageError.classList.remove('show');
            messageInfo.classList.remove('show');
        }

        function showInfo(msg) {
            messageInfo.textContent = msg;
            messageInfo.classList.add('show');
            messageError.classList.remove('show');
            messageSuccess.classList.remove('show');
        }

        function hideMessages() {
            messageError.classList.remove('show');
            messageSuccess.classList.remove('show');
            messageInfo.classList.remove('show');
        }

        urlInput.focus();
    </script>
</body>
</html>
