<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Downloader</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tabler-icons@latest/tabler-icons.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .content {
            padding: 40px 30px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: 500;
            color: #333;
            font-size: 14px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            gap: 10px;
        }

        input[type="text"],
        input[type="url"] {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus,
        input[type="url"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            flex: 1;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: #f5f5f5;
            color: #333;
            border: 2px solid #e0e0e0;
        }

        .btn-secondary:hover {
            background: #efefef;
        }

        .btn-download {
            background: #4CAF50;
            color: white;
        }

        .btn-download:hover:not(:disabled) {
            background: #45a049;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(76, 175, 80, 0.3);
        }

        .format-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .format-option {
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s ease;
            background: white;
        }

        .format-option input[type="radio"] {
            display: none;
        }

        .format-option:has(input:checked) {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.05);
        }

        .format-option label {
            margin: 0;
            cursor: pointer;
            font-weight: 500;
            color: #333;
        }

        .quality-selector {
            margin-bottom: 20px;
        }

        select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            background: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .video-info {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            border-left: 4px solid #667eea;
        }

        .video-info.show {
            display: block;
        }

        .video-info h3 {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .video-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
            word-break: break-word;
        }

        .video-duration {
            font-size: 13px;
            color: #999;
            margin-bottom: 8px;
        }

        .video-size {
            font-size: 13px;
            color: #999;
        }

        .progress-section {
            display: none;
            margin-bottom: 20px;
        }

        .progress-section.show {
            display: block;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s ease;
        }

        .progress-text {
            font-size: 12px;
            color: #999;
            text-align: center;
        }

        .message {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .message.show {
            display: block;
        }

        .message.error {
            background: #fee;
            color: #c33;
            border-left: 4px solid #c33;
        }

        .message.success {
            background: #efe;
            color: #3c3;
            border-left: 4px solid #3c3;
        }

        .message.info {
            background: #eef;
            color: #33c;
            border-left: 4px solid #33c;
        }

        .icon {
            width: 20px;
            height: 20px;
            display: inline-block;
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(0, 0, 0, 0.1);
            border-radius: 50%;
            border-top-color: #667eea;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .footer {
            border-top: 1px solid #e0e0e0;
            padding: 20px 30px;
            background: #fafafa;
            font-size: 12px;
            color: #999;
            text-align: center;
        }

        @media (max-width: 480px) {
            .header {
                padding: 30px 20px;
            }

            .header h1 {
                font-size: 24px;
            }

            .content {
                padding: 30px 20px;
            }

            .format-selector {
                grid-template-columns: 1fr;
            }

            button {
                font-size: 13px;
                padding: 10px 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>
                <i class="ti ti-brand-youtube"></i>
                YouTube Downloader
            </h1>
            <p>Baixe vídeos do YouTube em alta qualidade</p>
        </div>

        <div class="content">
            <div class="message error" id="messageError"></div>
            <div class="message success" id="messageSuccess"></div>
            <div class="message info" id="messageInfo"></div>

            <form id="downloadForm">
                <div class="form-group">
                    <label for="urlInput">URL do vídeo YouTube</label>
                    <div class="input-wrapper">
                        <input 
                            type="url"
                            id="urlInput" 
                            placeholder="https://www.youtube.com/watch?v=... ou youtu.be/..."
                            required
                        >
                    </div>
                </div>

                <div class="form-group">
                    <label>Formato de download</label>
                    <div class="format-selector">
                        <div class="format-option">
                            <input type="radio" id="format-video" name="format" value="video" checked>
                            <label for="format-video">
                                <i class="ti ti-video"></i><br>
                                Vídeo (MP4)
                            </label>
                        </div>
                        <div class="format-option">
                            <input type="radio" id="format-audio" name="format" value="audio">
                            <label for="format-audio">
                                <i class="ti ti-music"></i><br>
                                Áudio (MP3)
                            </label>
                        </div>
                    </div>
                </div>

                <div class="form-group quality-selector" id="qualityGroup">
                    <label for="quality">Qualidade</label>
                    <select id="quality">
                        <option value="best">Melhor disponível</option>
                        <option value="720">720p - HD (se disponível)</option>
                        <option value="480">480p - SD</option>
                        <option value="360">360p - SD</option>
                    </select>
                </div>

                <div class="video-info" id="videoInfo">
                    <h3>Informações do vídeo</h3>
                    <div class="video-title" id="videoTitle">-</div>
                    <div class="video-duration" id="videoDuration">-</div>
                    <div class="video-size" id="videoSize" style="display: none;">-</div>
                </div>

                <div class="progress-section" id="progressSection">
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <div class="progress-text" id="progressText">Processando...</div>
                </div>

                <div class="button-group">
                    <button type="button" class="btn-secondary" id="clearBtn">
                        <i class="ti ti-trash"></i> Limpar
                    </button>
                    <button type="button" class="btn-primary" id="infoBtn">
                        <i class="ti ti-info-circle"></i> Verificar
                    </button>
                    <button type="submit" class="btn-primary" id="downloadBtn" style="display: none;">
                        <i class="ti ti-download"></i> Baixar
                    </button>
                </div>
            </form>
        </div>

        <div class="footer">
            <p>⚠️ Respeite os direitos autorais. Baixe apenas conteúdo que você tem permissão para baixar.</p>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000';

        const form = document.getElementById('downloadForm');
        const urlInput = document.getElementById('urlInput');
        const formatInputs = document.querySelectorAll('input[name="format"]');
        const qualityGroup = document.getElementById('qualityGroup');
        const qualitySelect = document.getElementById('quality');
        const downloadBtn = document.getElementById('downloadBtn');
        const infoBtn = document.getElementById('infoBtn');
        const clearBtn = document.getElementById('clearBtn');
        const videoInfo = document.getElementById('videoInfo');
        const progressSection = document.getElementById('progressSection');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');

        const messageError = document.getElementById('messageError');
        const messageSuccess = document.getElementById('messageSuccess');
        const messageInfo = document.getElementById('messageInfo');

        let videoValidated = false;

        // Hide quality selector for audio
        formatInputs.forEach(input => {
            input.addEventListener('change', function() {
                if (this.value === 'audio') {
                    qualityGroup.style.display = 'none';
                } else {
                    qualityGroup.style.display = 'block';
                }
                videoValidated = false;
                downloadBtn.style.display = 'none';
                infoBtn.style.display = 'block';
            });
        });

        // Clear form
        clearBtn.addEventListener('click', function() {
            form.reset();
            videoInfo.classList.remove('show');
            progressSection.classList.remove('show');
            hideMessages();
            videoValidated = false;
            downloadBtn.style.display = 'none';
            infoBtn.style.display = 'block';
            urlInput.focus();
        });

        // Verificar informações do vídeo
        infoBtn.addEventListener('click', async function(e) {
            e.preventDefault();
            
            const url = urlInput.value.trim();

            if (!url) {
                showError('Por favor, insira uma URL válida do YouTube');
                return;
            }

            if (!isValidYouTubeUrl(url)) {
                showError('URL do YouTube inválida. Use um link válido (youtube.com ou youtu.be)');
                return;
            }

            await getVideoInfo(url);
        });

        // Form submission
        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            if (!videoValidated) {
                showError('Verifique as informações do vídeo antes de baixar');
                return;
            }

            const url = urlInput.value.trim();
            const format = document.querySelector('input[name="format"]:checked').value;
            const quality = qualitySelect.value;

            await downloadVideo(url, format, quality);
        });

        function isValidYouTubeUrl(url) {
            return /(?:youtube\.com|youtu\.be)/.test(url);
        }

        async function getVideoInfo(url) {
            infoBtn.disabled = true;
            infoBtn.innerHTML = '<div class="loading"></div> Verificando...';
            hideMessages();

            try {
                const response = await fetch(`${API_URL}/api/video-info`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });

                const data = await response.json();

                if (!response.ok) {
                    showError(data.error || 'Erro ao obter informações do vídeo');
                    infoBtn.disabled = false;
                    infoBtn.innerHTML = '<i class="ti ti-info-circle"></i> Verificar';
                    return;
                }

                // Mostrar informações
                document.getElementById('videoTitle').textContent = data.title;
                document.getElementById('videoDuration').textContent = `⏱️ Duração: ${data.duration}`;
                videoInfo.classList.add('show');

                videoValidated = true;
                downloadBtn.style.display = 'flex';
                infoBtn.style.display = 'none';

                showSuccess('✓ Vídeo validado! Você pode fazer o download agora.');

            } catch (error) {
                showError('Erro ao conectar ao servidor: ' + error.message);
            } finally {
                infoBtn.disabled = false;
                infoBtn.innerHTML = '<i class="ti ti-info-circle"></i> Verificar';
            }
        }

        async function downloadVideo(url, format, quality) {
            downloadBtn.disabled = true;
            downloadBtn.innerHTML = '<div class="loading"></div> Baixando...';
            progressSection.classList.add('show');
            progressFill.style.width = '0%';
            hideMessages();

            try {
                // Simular progresso enquanto aguarda
                simulateProgress();

                const response = await fetch(`${API_URL}/api/download`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url, format, quality })
                });

                const data = await response.json();

                if (!response.ok) {
                    showError(data.error || 'Erro ao processar download');
                    progressSection.classList.remove('show');
                    return;
                }

                progressFill.style.width = '100%';
                progressText.textContent = '100%';

                // Criar link de download
                const downloadLink = data.downloadUrl;
                showSuccess(`✓ Download pronto! Clique no botão abaixo para salvar.`);

                // Adicionar botão de download real
                const downloadRealBtn = document.createElement('button');
                downloadRealBtn.type = 'button';
                downloadRealBtn.className = 'btn-download';
                downloadRealBtn.innerHTML = `<i class="ti ti-download"></i> Clique aqui para baixar`;
                downloadRealBtn.onclick = () => {
                    window.location.href = `${API_URL}${downloadLink}`;
                    setTimeout(() => {
                        progressSection.classList.remove('show');
                    }, 1000);
                };

                messageSuccess.appendChild(downloadRealBtn);

            } catch (error) {
                showError('Erro ao processar: ' + error.message);
            } finally {
                downloadBtn.disabled = false;
                downloadBtn.innerHTML = '<i class="ti ti-download"></i> Baixar';
            }
        }

        function simulateProgress() {
            let progress = 10;
            const interval = setInterval(() => {
                progress += Math.random() * 20;
                if (progress > 90) progress = 90;
                
                progressFill.style.width = progress + '%';
                progressText.textContent = Math.floor(progress) + '%';

                if (progress >= 90) {
                    clearInterval(interval);
                }
            }, 500);
        }

        function showError(message) {
            messageError.textContent = message;
            messageError.classList.add('show');
            messageSuccess.classList.remove('show');
            messageInfo.classList.remove('show');
            messageSuccess.innerHTML = message;
        }

        function showSuccess(message) {
            messageSuccess.textContent = message;
            messageSuccess.classList.add('show');
            messageError.classList.remove('show');
            messageInfo.classList.remove('show');
        }

        function showInfo(message) {
            messageInfo.textContent = message;
            messageInfo.classList.add('show');
            messageError.classList.remove('show');
            messageSuccess.classList.remove('show');
        }

        function hideMessages() {
            messageError.classList.remove('show');
            messageSuccess.classList.remove('show');
            messageInfo.classList.remove('show');
            messageSuccess.innerHTML = '';
        }

        // Focus on URL input on page load
        urlInput.focus();
    </script>
</body>
</html>
