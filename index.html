<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Downloader</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tabler-icons@latest/tabler-icons.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 600px; background: white; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 40px 30px; text-align: center; }
        .header h1 { font-size: 28px; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 12px; }
        .header p { font-size: 14px; opacity: 0.9; }
        .content { padding: 40px 30px; }
        .form-group { margin-bottom: 25px; }
        label { display: block; margin-bottom: 10px; font-weight: 500; color: #333; font-size: 14px; }
        input[type="url"] { width: 100%; padding: 12px 16px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px; transition: all 0.3s; }
        input[type="url"]:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.1); }
        .button-group { display: flex; gap: 10px; margin-top: 25px; }
        button { padding: 12px 24px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; gap: 8px; flex: 1; justify-content: center; }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-primary:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(102,126,234,0.3); }
        .btn-secondary { background: #f5f5f5; color: #333; border: 2px solid #e0e0e0; }
        .btn-secondary:hover { background: #efefef; }
        .message { padding: 15px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; display: none; }
        .message.show { display: block; }
        .message.error { background: #fee; color: #c33; border-left: 4px solid #c33; }
        .message.success { background: #efe; color: #3c3; border-left: 4px solid #3c3; }
        .download-links { margin-top: 20px; padding: 20px; background: #f9f9f9; border-radius: 8px; border-left: 4px solid #667eea; }
        .download-links h3 { margin-bottom: 15px; color: #333; }
        .download-link { display: inline-block; margin: 8px 8px 8px 0; }
        .download-link a { display: inline-block; padding: 10px 16px; background: #667eea; color: white; text-decoration: none; border-radius: 6px; font-size: 13px; transition: all 0.3s; }
        .download-link a:hover { background: #5568d3; transform: translateY(-2px); }
        .loading { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(0,0,0,0.1); border-radius: 50%; border-top-color: #667eea; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .footer { border-top: 1px solid #e0e0e0; padding: 20px 30px; background: #fafafa; font-size: 12px; color: #999; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="ti ti-brand-youtube"></i> YouTube Downloader</h1>
            <p>Baixe vídeos do YouTube em alta qualidade</p>
        </div>
        <div class="content">
            <div class="message error" id="messageError"></div>
            <div class="message success" id="messageSuccess"></div>
            <form id="downloadForm">
                <div class="form-group">
                    <label for="urlInput">URL do vídeo YouTube</label>
                    <input type="url" id="urlInput" placeholder="https://www.youtube.com/watch?v=..." required>
                </div>
                <div class="button-group">
                    <button type="button" class="btn-secondary" id="clearBtn"><i class="ti ti-trash"></i> Limpar</button>
                    <button type="submit" class="btn-primary" id="downloadBtn"><i class="ti ti-download"></i> Gerar Download</button>
                </div>
            </form>
            <div id="downloadResult"></div>
        </div>
        <div class="footer">
            <p>⚠️ Respeite os direitos autorais. Baixe apenas conteúdo que você tem permissão.</p>
        </div>
    </div>

    <script>
        const SERVER_URL = 'https://youtube-4vor.onrender.com';
        const form = document.getElementById('downloadForm');
        const urlInput = document.getElementById('urlInput');
        const downloadBtn = document.getElementById('downloadBtn');
        const clearBtn = document.getElementById('clearBtn');
        const messageError = document.getElementById('messageError');
        const messageSuccess = document.getElementById('messageSuccess');
        const downloadResult = document.getElementById('downloadResult');

        clearBtn.addEventListener('click', () => {
            form.reset();
            downloadResult.innerHTML = '';
            messageError.classList.remove('show');
            messageSuccess.classList.remove('show');
            urlInput.focus();
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const url = urlInput.value.trim();
            if (!url) {
                showError('Insira uma URL válida');
                return;
            }

            downloadBtn.disabled = true;
            downloadBtn.innerHTML = '<div class="loading"></div> Processando...';
            downloadResult.innerHTML = '';
            messageError.classList.remove('show');

            try {
                const response = await fetch(`${SERVER_URL}/api/download`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url, format: 'video', quality: 'best' })
                });

                const data = await response.json();

                if (data.success) {
                    showSuccess('✓ Links de download gerados!');
                    
                    let html = '<div class="download-links"><h3>Escolha um serviço para baixar:</h3>';
                    for (const [service, link] of Object.entries(data.downloadUrls)) {
                        const label = service.toUpperCase();
                        html += `<div class="download-link"><a href="${link}" target="_blank">${label}</a></div>`;
                    }
                    html += '</div>';
                    
                    downloadResult.innerHTML = html;
                } else {
                    showError(data.error || 'Erro ao processar');
                }
            } catch (error) {
                showError('Erro: ' + error.message);
            } finally {
                downloadBtn.disabled = false;
                downloadBtn.innerHTML = '<i class="ti ti-download"></i> Gerar Download';
            }
        });

        function showError(msg) {
            messageError.textContent = msg;
            messageError.classList.add('show');
            messageSuccess.classList.remove('show');
        }

        function showSuccess(msg) {
            messageSuccess.textContent = msg;
            messageSuccess.classList.add('show');
            messageError.classList.remove('show');
        }

        urlInput.focus();
    </script>
</body>
</html>
