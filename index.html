<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Downloader</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tabler-icons@latest/tabler-icons.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 600px; background: white; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 40px 30px; text-align: center; }
        .header h1 { font-size: 28px; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 12px; }
        .content { padding: 40px 30px; }
        .form-group { margin-bottom: 25px; }
        label { display: block; margin-bottom: 10px; font-weight: 500; color: #333; }
        input, select { width: 100%; padding: 12px 16px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px; }
        input:focus, select:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.1); }
        .button-group { display: flex; gap: 10px; margin-top: 25px; }
        button { padding: 12px 24px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; flex: 1; justify-content: center; transition: all 0.3s; }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-primary:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(102,126,234,0.3); }
        .btn-secondary { background: #f5f5f5; color: #333; border: 2px solid #e0e0e0; }
        .message { padding: 15px; border-radius: 8px; margin-bottom: 20px; display: none; }
        .message.show { display: block; }
        .message.error { background: #fee; color: #c33; border-left: 4px solid #c33; }
        .message.success { background: #efe; color: #3c3; border-left: 4px solid #3c3; }
        .video-info { background: #f9f9f9; padding: 15px; border-radius: 8px; margin-bottom: 20px; border-left: 4px solid #667eea; display: none; }
        .video-info.show { display: block; }
        .loading { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(0,0,0,0.1); border-radius: 50%; border-top-color: #667eea; animation: spin 0.8s infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .footer { border-top: 1px solid #e0e0e0; padding: 20px 30px; background: #fafafa; font-size: 12px; color: #999; text-align: center; }
        .format-selector { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 8px; }
        .format-option { padding: 12px; border: 1px solid #dadce0; border-radius: 6px; cursor: pointer; text-align: center; }
        .format-option input { display: none; }
        .format-option:has(input:checked) { border-color: #667eea; background: rgba(102,126,234,0.05); }
        .quality-selector { display: none; }
        .quality-selector.show { display: block; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="ti ti-brand-youtube"></i> YouTube Downloader</h1>
            <p>Baixe vídeos do YouTube em alta qualidade</p>
        </div>
        <div class="content">
            <div class="message error" id="messageError"></div>
            <div class="message success" id="messageSuccess"></div>
            <form id="downloadForm">
                <div class="form-group">
                    <label>URL do vídeo YouTube</label>
                    <input type="url" id="urlInput" placeholder="https://www.youtube.com/watch?v=..." required>
                </div>
                <div class="form-group">
                    <label>Formato</label>
                    <div class="format-selector">
                        <div class="format-option">
                            <input type="radio" id="format-video" name="format" value="video" checked>
                            <label for="format-video" style="margin: 0;"><i class="ti ti-video"></i><br>Vídeo (MP4)</label>
                        </div>
                        <div class="format-option">
                            <input type="radio" id="format-audio" name="format" value="audio">
                            <label for="format-audio" style="margin: 0;"><i class="ti ti-music"></i><br>Áudio (MP3)</label>
                        </div>
                    </div>
                </div>
                <div class="form-group quality-selector" id="qualityGroup">
                    <label>Qualidade</label>
                    <select id="quality">
                        <option value="best">Melhor disponível</option>
                        <option value="720">720p HD</option>
                        <option value="480">480p SD</option>
                    </select>
                </div>
                <div class="video-info" id="videoInfo">
                    <div><strong id="videoTitle">-</strong></div>
                    <div id="videoDuration" style="font-size: 13px; color: #999; margin-top: 5px;">-</div>
                </div>
                <div class="button-group">
                    <button type="button" class="btn-secondary" id="clearBtn"><i class="ti ti-trash"></i> Limpar</button>
                    <button type="button" class="btn-primary" id="checkBtn"><i class="ti ti-info-circle"></i> Verificar</button>
                    <button type="submit" class="btn-primary" id="downloadBtn" style="display: none;"><i class="ti ti-download"></i> Baixar</button>
                </div>
            </form>
        </div>
        <div class="footer">
            <p>⚠️ Respeite os direitos autorais.</p>
        </div>
    </div>

    <script>
        const SERVER = 'https://youtube-4vor.onrender.com';
        const form = document.getElementById('downloadForm');
        const urlInput = document.getElementById('urlInput');
        const formatInputs = document.querySelectorAll('input[name="format"]');
        const qualityGroup = document.getElementById('qualityGroup');
        const checkBtn = document.getElementById('checkBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const clearBtn = document.getElementById('clearBtn');
        const messageError = document.getElementById('messageError');
        const messageSuccess = document.getElementById('messageSuccess');
        const videoInfo = document.getElementById('videoInfo');

        let videoValidated = false;

        formatInputs.forEach(input => {
            input.addEventListener('change', function() {
                qualityGroup.classList.toggle('show', this.value === 'video');
                videoValidated = false;
                downloadBtn.style.display = 'none';
            });
        });

        clearBtn.addEventListener('click', () => {
            form.reset();
            videoInfo.classList.remove('show');
            messageError.classList.remove('show');
            messageSuccess.classList.remove('show');
            videoValidated = false;
            downloadBtn.style.display = 'none';
            urlInput.focus();
        });

        checkBtn.addEventListener('click', async (e) => {
            e.preventDefault();
            const url = urlInput.value.trim();
            
            if (!url) {
                showError('Insira uma URL');
                return;
            }

            checkBtn.disabled = true;
            checkBtn.innerHTML = '<div class="loading"></div> Verificando...';
            messageError.classList.remove('show');

            try {
                const res = await fetch(`${SERVER}/api/video-info`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });

                const data = await res.json();

                if (data.success) {
                    document.getElementById('videoTitle').textContent = data.title;
                    document.getElementById('videoDuration').textContent = `⏱️ ${data.duration}`;
                    videoInfo.classList.add('show');
                    videoValidated = true;
                    downloadBtn.style.display = 'flex';
                    showSuccess('✓ Vídeo validado!');
                } else {
                    showError(data.error || 'Erro ao validar');
                }
            } catch (error) {
                showError('Erro: ' + error.message);
            } finally {
                checkBtn.disabled = false;
                checkBtn.innerHTML = '<i class="ti ti-info-circle"></i> Verificar';
            }
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (!videoValidated) {
                showError('Verifique o vídeo primeiro');
                return;
            }

            const url = urlInput.value.trim();
            const format = document.querySelector('input[name="format"]:checked').value;
            const quality = document.getElementById('quality').value;

            downloadBtn.disabled = true;
            downloadBtn.innerHTML = '<div class="loading"></div> Baixando...';
            messageError.classList.remove('show');

            try {
                const res = await fetch(`${SERVER}/api/download`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url, format, quality })
                });

                const data = await res.json();

                if (data.success) {
                    showSuccess('✓ Download pronto!');
                    setTimeout(() => {
                        window.open(`${SERVER}${data.downloadUrl}`, '_blank');
                    }, 500);
                } else {
                    showError(data.error || 'Erro no download');
                }
            } catch (error) {
                showError('Erro: ' + error.message);
            } finally {
                downloadBtn.disabled = false;
                downloadBtn.innerHTML = '<i class="ti ti-download"></i> Baixar';
            }
        });

        function showError(msg) {
            messageError.textContent = msg;
            messageError.classList.add('show');
            messageSuccess.classList.remove('show');
        }

        function showSuccess(msg) {
            messageSuccess.textContent = msg;
            messageSuccess.classList.add('show');
            messageError.classList.remove('show');
        }

        urlInput.focus();
    </script>
</body>
</html>
