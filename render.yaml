services:
  - type: web
    name: youtube-downloader
    env: node
    plan: free
    buildCommand: npm install && curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp && chmod +x /usr/local/bin/yt-dlp
    startCommand: node server.js
    envVars:
      - key: PATH
        value: /usr/local/bin:$PATH
