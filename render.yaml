services:
  - type: web
    name: youtube-downloader
    env: node
    plan: free
    buildCommand: npm install
    startCommand: bash -c 'mkdir -p $HOME/.local/bin && curl -L https://github.com/yt-dlp/yt-dlp/releases/download/2026.03.17/yt-dlp -o $HOME/.local/bin/yt-dlp && chmod +x $HOME/.local/bin/yt-dlp && export PATH=$HOME/.local/bin:$PATH && node server.js'
    envVars:
      - key: PATH
        value: $HOME/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
